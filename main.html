<!DOCTYPE html>

<html>

<head>
	<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
rel="stylesheet">
	<link rel="stylesheet" href="styles.css">
</head>

<body>
	<!-- the entire body must be written by student -->
	<div class="container mt-5">

<form class="needs-validation">

<div class="row">

<div class="col-md-6 mb-3">
<label>First Name</label>
<input
id="first-name-input"
type="text"
class="form-control"
required>

<div class="invalid-feedback">
Please provide first name
</div>
</div>

<div class="col-md-6 mb-3">
<label>Last Name</label>

<input
type="text"
class="form-control"
required>

<div class="invalid-feedback">
Please provide last name
</div>

</div>

</div>


<div class="mb-3">

<label>Email</label>

<input
id="email-input"
type="email"
class="form-control"
required>

<div class="invalid-feedback">
Please provide valid email
</div>

</div>


<div class="mb-3">

<label>College Name</label>

<input
id="college-input"
type="text"
class="form-control"
required>

<div class="invalid-feedback">
Please provide college name
</div>

</div>


<div class="mb-3">

<label>Roll Number</label>

<input
id="roll-no-input"
type="number"
class="form-control"
required>

<div class="invalid-feedback">
Please provide roll number
</div>

</div>


<div class="mb-3">

<label>Graduation Year</label>

<select
class="form-select"
required>

<option value="">
Choose...
</option>

<option>
2020
</option>

<option>
2021
</option>

<option>
2022
</option>

<option>
2023
</option>

</select>

<div class="invalid-feedback">
Select graduation year
</div>

</div>


<div class="form-check mb-3">

<input
id="conditions-checkbox"
type="checkbox"
class="form-check-input"
required>

<label class="form-check-label">

Accept Terms and Conditions

</label>

<div class="invalid-feedback">
Accept conditions
</div>

</div>


<button
class="btn btn-primary"
type="submit">

Submit

</button>

</form>

</div>

    <script type="text/javascript" src="./script.js">
</script>

</body>

</html>
