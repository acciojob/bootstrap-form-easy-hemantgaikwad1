<!DOCTYPE html>

<html>

<head>
	<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
rel="stylesheet">
	<link rel="stylesheet" href="styles.css">
</head>

<body>
	<!-- the entire body must be written by student -->
<div class="container mt-4">

<form>

<div class="mb-3">
<label for="first-name-input">First Name</label>
<input
id="first-name-input"
type="text"
class="form-control"
required>
<div class="invalid-feedback">
Please enter first name
</div>
</div>


<div class="mb-3">
<label for="last-name-input">Last Name</label>
<input
id="last-name-input"
type="text"
class="form-control"
required>
<div class="invalid-feedback">
Please enter last name
</div>
</div>


<div class="mb-3">
<label for="email-input">Email Address</label>
<input
id="email-input"
type="email"
class="form-control"
required>
<div class="invalid-feedback">
Please enter email
</div>
</div>


<div class="mb-3">
<label for="college-input">College</label>
<input
id="college-input"
type="text"
class="form-control"
required>
<div class="invalid-feedback">
Please enter college
</div>
</div>


<div class="mb-3">
<label for="roll-no-input">Roll No.</label>
<input
id="roll-no-input"
type="text"
class="form-control"
required>
<div class="invalid-feedback">
Please enter roll number
</div>
</div>


<div class="mb-3">
<label for="grad-year-select">
Graduation Year
</label>

<select
id="grad-year-select"
class="form-select"
required>

<option value="">Choose...</option>
<option>2020</option>
<option>2021</option>
<option>2022</option>
<option>2023</option>

</select>

<div class="invalid-feedback">
Select graduation year
</div>

</div>


<div class="form-check">

<input
id="conditions-checkbox"
type="checkbox"
class="form-check-input"
required>

<label for="conditions-checkbox">
Agree to terms and conditions
</label>

<div class="invalid-feedback">
Accept conditions
</div>

</div>

</form>

</div>



    <script type="text/javascript" src="./script.js">
</script>

</body>

</html>
